services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pantrymaid}
      POSTGRES_USER: ${POSTGRES_USER:-pantrymaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pantrymaid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: masterhuh/pantryradar:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}
      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # LLM
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # GROQ_API_KEY: ${GROQ_API_KEY}
      # Kroger product lookup
      KROGER_CLIENT_ID: ${KROGER_CLIENT_ID}
      KROGER_CLIENT_SECRET: ${KROGER_CLIENT_SECRET}
      # Receipt scanning
      VERYFI_CLIENT_ID: ${VERYFI_CLIENT_ID:-}
      VERYFI_CLIENT_SECRET: ${VERYFI_CLIENT_SECRET:-}
      VERYFI_USERNAME: ${VERYFI_USERNAME:-}
      VERYFI_API_KEY: ${VERYFI_API_KEY:-}
      # Server
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      SSL_MODE: ${SSL_MODE:-internal}
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
